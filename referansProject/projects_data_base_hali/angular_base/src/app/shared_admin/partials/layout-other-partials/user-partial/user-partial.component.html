<!-- begin::User Panel-->
<div id="user_partial" class="offcanvas p-10" [ngClass]="direction">
    <ng-container *ngIf="true">
      <!--begin::Header-->
      <div class="offcanvas-header d-flex align-items-center justify-content-between pb-5">
        <h3 class="font-weight-bold m-0">
          Kullanıcı Profili
        </h3>
        <a href="#" class="btn btn-xs btn-icon btn-light btn-hover-primary"  id="user_partial_close">
          <i class="ki ki-close icon-xs text-muted"></i>
        </a>
      </div>
      <!--end::Header-->
      <!--begin::Content-->
      <div class="offcanvas-content pr-5 mr-n5">
        <!--begin::Header-->
        <div class="d-flex align-items-center mt-5">
          <div class="symbol symbol-100 mr-5">
            <div class="symbol-label" style="background-image: url('./assets/media/blank.png');"></div>
            <i class="symbol-badge bg-success"></i>
          </div>
          <div class="d-flex flex-column">
            <a href="#" class="font-weight-bold font-size-h5 text-dark-75 text-hover-primary">
             {{ admin.name}} {{admin.surname}}
            </a>
            <div class="text-muted mt-1">
              Proje Yöneticisi
            </div>
            <div class="navi mt-2">
              <p class="navi-text text-muted text-bold">
                Firma: &nbsp;{{admin.companyName}}
              </p>
              <a href="#" class="navi-item">
                <span class="navi-link p-0 pb-2">
                  <span class="navi-icon mr-1">
                    <span [inlineSVG]="
                        './assets/media/Mail-notification.svg'
                      " cacheSVG="true" class="svg-icon svg-icon-lg svg-icon-primary"></span>
                  </span>
                  <span class="navi-text text-muted text-hover-primary">
                    {{admin.mail}}
                  </span>
                </span>
              </a>

              <a class="btn btn-sm btn-light-primary font-weight-bolder py-2 px-5 cursor-pointer" (click)="logout()">Çıkış Yap</a>
            </div>
          </div>
        </div>
        <!--end::Header-->
      </div>
      <!--end::Content-->
    </ng-container>
  </div>
  <!-- end::User Panel-->
