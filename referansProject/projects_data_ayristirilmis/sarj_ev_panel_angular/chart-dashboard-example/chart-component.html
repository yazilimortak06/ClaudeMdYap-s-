<!-- Pattern: Chart/Dashboard HTML — canvas id ile chart.js bağlantısı, widget card yapısı, son 6 ay KW özeti -->

<div class="card card-custom" [ngClass]="cssClass">
  <!-- Body -->
  <div class="card-body p-0">
    <div class="d-flex align-items-center justify-content-between card-spacer flex-grow-1"
      style="background-color: #c0fff9;">
      <div class="d-flex flex-column me-2">
        <div class="row">
          <div class="col-md-3" style="margin: auto;">
            <mat-icon style="font-size:35px !important"
              class="text-dark-75 font-weight-bolder font-size-h3">battery_charging_full</mat-icon>
          </div>
          <div class="col-md-9" style="display: inline-grid;">
            <span class="text-dark-75 font-weight-bolder font-size-h3">Son 6 Ay</span>
            <span class="text-muted font-weight-bold mt-2">Harcanılan Kw
            </span>
          </div>
        </div>
      </div>
      <div class="d-flex flex-column text-right">
        <span class="text-dark-75 font-weight-bolder font-size-h3">+ {{lastMonthLoadedKw}} Kw </span>
        <span class="text-muted font-weight-bold mt-2">Bu Ay Harcanılan</span>
      </div>
    </div>
    <!--begin::Chart-->
    <div class="chart-container">
      <div class="chart-container">
        <canvas id="MonthlyChargeProcessChart" style="height: 450px;">{{ monthlyChargeProcessChart }}</canvas>
      </div>
    </div>
    <!--end::Chart-->
    <!--end::Stats-->
  </div>
</div>
