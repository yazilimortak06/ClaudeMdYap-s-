version: "3.8"

services:

  crm.api:
    image: [REGISTRY]/crm.api:[TAG]
    environment:
      - ASPNETCORE_ENVIRONMENT=[ENVIRONMENT]
      - ConnectionStrings__MainConnectionString=[CONNECTION_STRING]
      - RabbitMqSettings__HostName=[RABBITMQ_HOST]
      - RabbitMqSettings__UserName=[RABBITMQ_USER]
      - RabbitMqSettings__Password=[PASSWORD]
      - StartupConfigs__ApiName=CRM
      - StartupConfigs__ApiUrl=[CRM_API_URL]
      - TokenServiceUrl=[TOKEN_SERVICE_URL]
    ports:
      - "[HOST_PORT]:80"
    depends_on:
      - rabbitmq
    restart: unless-stopped

  crmlogservice.api:
    image: [REGISTRY]/crmlogservice.api:[TAG]
    environment:
      - ASPNETCORE_ENVIRONMENT=[ENVIRONMENT]
      - MongoDbSettings__ConnectionString=[MONGODB_CONNECTION_STRING]
      - MongoDbSettings__DatabaseName=[MONGODB_DATABASE_NAME]
      - RabbitMqSettings__HostName=[RABBITMQ_HOST]
      - RabbitMqSettings__UserName=[RABBITMQ_USER]
      - RabbitMqSettings__Password=[PASSWORD]
    depends_on:
      - rabbitmq
      - logdb
    restart: unless-stopped

  crmnotificationservice.api:
    image: [REGISTRY]/crmnotificationservice.api:[TAG]
    environment:
      - ASPNETCORE_ENVIRONMENT=[ENVIRONMENT]
      - ConnectionStrings__MainConnectionString=[CONNECTION_STRING]
      - RabbitMqSettings__HostName=[RABBITMQ_HOST]
      - RabbitMqSettings__UserName=[RABBITMQ_USER]
      - RabbitMqSettings__Password=[PASSWORD]
      - SmtpSettings__Host=[SMTP_HOST]
      - SmtpSettings__Port=[SMTP_PORT]
      - SmtpSettings__UserName=[SMTP_USER]
      - SmtpSettings__Password=[SMTP_PASSWORD]
    depends_on:
      - rabbitmq
    restart: unless-stopped

  crmFile.api:
    image: [REGISTRY]/crmFile.api:[TAG]
    environment:
      - ASPNETCORE_ENVIRONMENT=[ENVIRONMENT]
      - ConnectionStrings__MainConnectionString=[CONNECTION_STRING]
      - FileSettings__UploadPath=[FILE_UPLOAD_PATH]
      - FileSettings__MaxFileSizeMB=[MAX_FILE_SIZE_MB]
    ports:
      - "[HOST_PORT]:80"
    volumes:
      - crm_uploaded_files:[FILE_UPLOAD_PATH]
    restart: unless-stopped

  crmworkerservice.api:
    image: [REGISTRY]/crmworkerservice.api:[TAG]
    environment:
      - ASPNETCORE_ENVIRONMENT=[ENVIRONMENT]
      - ConnectionStrings__MainConnectionString=[CONNECTION_STRING]
      - RabbitMqSettings__HostName=[RABBITMQ_HOST]
      - RabbitMqSettings__UserName=[RABBITMQ_USER]
      - RabbitMqSettings__Password=[PASSWORD]
    ports:
      - "[HOST_PORT]:80"
    depends_on:
      - rabbitmq
    restart: unless-stopped

  tokenservice.api:
    image: [REGISTRY]/tokenservice.api:[TAG]
    environment:
      - ASPNETCORE_ENVIRONMENT=[ENVIRONMENT]
      - ConnectionStrings__MainConnectionString=[CONNECTION_STRING]
      - JwtSettings__SecretKey=[JWT_SECRET_KEY]
      - JwtSettings__Issuer=[JWT_ISSUER]
      - JwtSettings__Audience=[JWT_AUDIENCE]
      - JwtSettings__ExpiryMinutes=[JWT_EXPIRY_MINUTES]
    ports:
      - "[HOST_PORT]:80"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=[RABBITMQ_USER]
      - RABBITMQ_DEFAULT_PASS=[PASSWORD]
      - RABBITMQ_DEFAULT_VHOST=[RABBITMQ_VHOST]
    ports:
      - "[HOST_PORT]:5672"
      - "[HOST_PORT_MGMT]:15672"
    volumes:
      - crm_rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  logdb:
    image: mongo:5.0
    environment:
      - MONGO_INITDB_ROOT_USERNAME=[MONGO_USER]
      - MONGO_INITDB_ROOT_PASSWORD=[MONGO_PASSWORD]
      - MONGO_INITDB_DATABASE=[MONGODB_DATABASE_NAME]
    ports:
      - "[HOST_PORT]:27017"
    volumes:
      - crm_mongo_data:/data/db
    restart: unless-stopped

volumes:
  crm_rabbitmq_data:
  crm_mongo_data:
  crm_uploaded_files:
